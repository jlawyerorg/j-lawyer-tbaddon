<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title data-i18n="imageEditTitle">Image editing - j-lawyer.org for Thunderbird</title>
    <link rel="stylesheet" href="image-edit-overlay.css">
    <script src="jspdf.umd.js"></script>
    <style>
        /* Größeres Overlay für bessere Bilddarstellung */
        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="header">
            <h2 data-i18n="imageEditingHeading">Image editing</h2>
            <div class="progress-info">
                <span id="progressText"></span>
            </div>
        </div>

        <div class="main-content">
            <div class="image-container">
                <div class="canvas-wrapper">
                    <canvas id="imageCanvas"></canvas>
                    <div id="cropBox" class="crop-box"></div>
                </div>
            </div>

            <div class="controls">
                <div class="crop-controls">
                    <h3 data-i18n="cropHeading">Crop</h3>
                    <div class="crop-buttons">
                        <button id="resetCropBtn" class="btn btn-secondary" data-i18n="resetButton">Reset</button>
                        <button id="applyCropBtn" class="btn btn-primary" data-i18n="applyCropButton">Apply crop</button>
                    </div>
                </div>

                <div class="rotate-controls">
                    <h3 data-i18n="rotateHeading">Rotate</h3>
                    <div class="rotate-buttons">
                        <button id="rotateLeftBtn" class="btn btn-secondary" data-i18n="rotateLeftButton">Rotate left</button>
                        <button id="rotateRightBtn" class="btn btn-secondary" data-i18n="rotateRightButton">Rotate right</button>
                        <button id="resetRotationBtn" class="btn btn-secondary" data-i18n="resetRotationButton">Reset rotation</button>
                    </div>
                </div>

                <div class="navigation-controls">
                    <button id="skipBtn" class="btn btn-warning" data-i18n="skipImageButton">Skip image</button>
                    <button id="nextBtn" class="btn btn-success" data-i18n="nextButton">Next</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <div id="finishOptions" class="finish-options" style="display: none;">
                <div class="finish-layout-container">
                    <!-- Abbrechen Button links -->
                    <div class="cancel-section">
                        <button id="cancelBtn" class="btn btn-danger" data-i18n="cancelButton">Cancel</button>
                    </div>
                    
                    <!-- Vorschau in der Mitte -->
                    <div class="preview-center-section">
                        <h3 class="finish-title" data-i18n="finishEditingHeading">Finish editing</h3>
                        
                        <div id="previewSection" class="preview-section-compact">
                            <div class="preview-header">
                                <span class="preview-title" data-i18n="previewLabel">Preview:</span>
                                <span id="previewInfo" class="preview-info-compact"></span>
                                <button id="renameBtn" class="btn btn-secondary btn-small" data-i18n="renameButton">Rename</button>
                            </div>
                            <div class="preview-container-compact">
                                <button id="prevImageBtn" class="nav-btn-compact" disabled>◀</button>
                                <img id="previewImage" class="preview-image-compact" alt="Preview" data-i18n-title="previewLabel">
                                <button id="nextImageBtn" class="nav-btn-compact" disabled>▶</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Action Buttons rechts -->
                    <div class="action-buttons-section">
                        <div id="uploadInfo" class="upload-info" style="display: none; margin-bottom: 10px; font-size: 12px; color: #666;">
                            <div data-i18n="pdfCreatedFromImages">PDF will be created from images</div>
                            <div id="additionalFilesInfo" style="display: none;" data-i18n="additionalFilesUploadedSeparately">Additional files will be uploaded individually</div>
                        </div>
                        <button id="uploadIndividualBtn" class="btn btn-primary" data-i18n="uploadIndividuallyButton">Upload individually</button>
                        <button id="createPdfBtn" class="btn btn-success" data-i18n="combineAsPdfButton">Combine as PDF</button>
                    </div>
                </div>
            </div>
            
            <!-- Normaler Abbrechen Button für normale Ansicht (nicht finish-options) -->
            <button id="cancelBtnNormal" class="btn btn-danger" data-i18n="cancelButton">Cancel</button>
        </div>
    </div>

    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
        <div class="spinner"></div>
        <p data-i18n="imageProcessing">Processing image...</p>
    </div>

    <!-- Rename Dialog -->
    <div id="renameDialog" class="rename-dialog" style="display: none;">
        <div class="rename-dialog-content">
            <h3 data-i18n="renameFileHeading">Rename file</h3>
            <div class="rename-form">
                <label for="filenameInput" data-i18n="newFilenameLabel">New file name:</label>
                <input type="text" id="filenameInput" class="filename-input-full" placeholder="Enter file name" data-i18n-placeholder="filenameInputPlaceholder">
                <div class="filename-suggestion">
                    <small><span data-i18n="timestampSuggestionLabel">Timestamp suggestion:</span> <span id="filenameSuggestion"></span></small>
                </div>
                <div class="rename-buttons">
                    <button id="useSuggestionBtn" class="btn btn-secondary" data-i18n="useSuggestionButton">Use suggestion</button>
                    <button id="cancelRenameBtn" class="btn btn-secondary" data-i18n="cancelButton">Cancel</button>
                    <button id="confirmRenameBtn" class="btn btn-primary" data-i18n="renameButton">Rename</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PDF Rename Dialog -->
    <div id="pdfRenameDialog" class="rename-dialog" style="display: none;">
        <div class="rename-dialog-content">
            <h3 data-i18n="setPdfFilenameHeading">Set PDF file name</h3>
            <div class="rename-form">
                <label for="pdfFilenameInput" data-i18n="pdfFilenameLabel">PDF file name:</label>
                <input type="text" id="pdfFilenameInput" class="filename-input-full" placeholder="Enter PDF file name" data-i18n-placeholder="pdfFilenamePlaceholder">
                <div class="filename-suggestion">
                    <small><span data-i18n="timestampSuggestionLabel">Timestamp suggestion:</span> <span id="pdfFilenameSuggestion"></span></small>
                </div>
                <div class="rename-buttons">
                    <button id="usePdfSuggestionBtn" class="btn btn-secondary" data-i18n="useSuggestionButton">Use suggestion</button>
                    <button id="cancelPdfRenameBtn" class="btn btn-secondary" data-i18n="cancelButton">Cancel</button>
                    <button id="confirmPdfRenameBtn" class="btn btn-primary" data-i18n="createPdfButton">Create PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="image-edit-overlay.js"></script>
</body>
</html>
